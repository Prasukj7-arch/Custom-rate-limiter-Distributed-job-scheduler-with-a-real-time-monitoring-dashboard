<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel | Rate Limiter & Scheduler</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="script.js" defer></script>

</head>

<body>

    <div class="container">
        <header>
            <div class="brand">
                <div class="logo-box">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                </div>
                <h1>Sentinel Control Plane</h1>
            </div>
            <div class="status-badge" id="connStatus">
                <div class="status-dot"></div>
                SYSTEM ONLINE
            </div>
        </header>

        <div class="grid">
            <div class="card" id="card-allowed">
                <div class="card-header">
                    <h2>Requests Allowed</h2>
                    <div class="icon-circle">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <polyline points="20 6 9 17 4 12" />
                        </svg>
                    </div>
                </div>
                <div class="value" id="allowed">0</div>
            </div>
            <div class="card" id="card-blocked">
                <div class="card-header">
                    <h2>Rate Limited</h2>
                    <div class="icon-circle">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="15" y1="9" x2="9" y2="15" />
                            <line x1="9" y1="9" x2="15" y2="15" />
                        </svg>
                    </div>
                </div>
                <div class="value" id="blocked">0</div>
            </div>
            <div class="card" id="card-processed">
                <div class="card-header">
                    <h2>Jobs Executed</h2>
                    <div class="icon-circle">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                        </svg>
                    </div>
                </div>
                <div class="value" id="processed">0</div>
            </div>
            <div class="card" id="card-failed">
                <div class="card-header">
                    <h2>Job Failures</h2>
                    <div class="icon-circle">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path
                                d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                            <line x1="12" y1="9" x2="12" y2="13" />
                            <line x1="12" y1="17" x2="12.01" y2="17" />
                        </svg>
                    </div>
                </div>
                <div class="value" id="failed">0</div>
            </div>
            <div class="card" id="card-queue">
                <div class="card-header">
                    <h2>Task Queue</h2>
                    <div class="icon-circle">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <line x1="3" y1="6" x2="21" y2="6" />
                            <line x1="3" y1="12" x2="21" y2="12" />
                            <line x1="3" y1="18" x2="21" y2="18" />
                        </svg>
                    </div>
                </div>
                <div class="value" id="queue">0</div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 3v18h18" />
                    <path d="m19 9-5 5-4-4-3 3" />
                </svg>
                Traffic & Execution Telemetry
            </div>
            <canvas id="chart" height="100"></canvas>
        </div>

        <div class="footer">
            <p>High-performance Rate Limiter & Distributed Scheduler Telemetry</p>
            <p>&copy; 2026 prasukJain. All rights reserved.</p>
        </div>
    </div>

    <div class="alert-area">
        <div id="alertBox" class="alert">
            <span id="alertIcon"></span>
            <span id="alertMessage"></span>
        </div>
    </div>



</body>

</html>
