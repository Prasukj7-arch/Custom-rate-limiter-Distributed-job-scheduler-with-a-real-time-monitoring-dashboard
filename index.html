<!DOCTYPE html>
<html>

<head>
    <title>Live System Metrics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; text-align: center;">

    <h1>Real-Time Dashboard</h1>

    <h2>Metrics</h2>
    <p>Allowed: <span id="allowed">0</span></p>
    <p>Blocked: <span id="blocked">0</span></p>
    <p>Processed: <span id="processed">0</span></p>
    <p>Failed: <span id="failed">0</span></p>
    <p>Queue Depth: <span id="queue">0</span></p>

    <canvas id="chart" width="600" height="300"></canvas>

    <script>
        const eventSource = new EventSource("http://127.0.0.1:8000/metrics/stream");

        const ctx = document.getElementById("chart").getContext("2d");

        const chart = new Chart(ctx, {
            type: "line",
            data: {
                labels: [],
                datasets: [
                    { label: "Processed", data: [], borderWidth: 2 },
                    { label: "Failed", data: [], borderWidth: 2 },
                    { label: "Queue", data: [], borderWidth: 2 }
                ]
            }
        });

        eventSource.onmessage = function (event) {
            const data = JSON.parse(event.data);

            document.getElementById("allowed").innerText = data.allowed;
            document.getElementById("blocked").innerText = data.blocked;
            document.getElementById("processed").innerText = data.processed;
            document.getElementById("failed").innerText = data.failed;
            document.getElementById("queue").innerText = data.queue_depth;

            const time = new Date().toLocaleTimeString();

            chart.data.labels.push(time);
            chart.data.datasets[0].data.push(data.processed);
            chart.data.datasets[1].data.push(data.failed);
            chart.data.datasets[2].data.push(data.queue_depth);

            if (chart.data.labels.length > 10) {
                chart.data.labels.shift();
                chart.data.datasets.forEach(d => d.data.shift());
            }

            chart.update();
        };
    </script>

</body>

</html>
